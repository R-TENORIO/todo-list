name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Testes Unitários com Jest
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

  # Job 2: Validação de HTML/CSS/JS
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Validando arquivos HTML..."
          if [ -f index.html ]; then
            echo "index.html encontrado!"
          else
            echo "Erro: index.html nao encontrado!"
            exit 1
          fi

      - name: Validate CSS
        run: |
          echo "Validando arquivos CSS..."
          if [ -f styles.css ]; then
            echo "styles.css encontrado!"
          else
            echo "Erro: styles.css nao encontrado!"
            exit 1
          fi

      - name: Validate JavaScript
        run: |
          echo "Validando arquivos JavaScript..."
          if [ -f script.js ]; then
            echo "script.js encontrado!"
          else
            echo "Erro: script.js nao encontrado!"
            exit 1
          fi

  # Job 3: Build do Docker
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Construindo imagem Docker..."
          docker build -t todo-list:${{ github.sha }} .
          echo "Imagem construida com sucesso!"

      - name: Verify Docker image
        run: |
          docker images | grep todo-list
          echo "Imagem verificada!"

  # Job 4: Deploy para GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
